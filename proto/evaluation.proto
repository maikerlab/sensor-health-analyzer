syntax = "proto3";
package evaluation;

// The evaluation service definition.
service EvaluationService {
  // Evaluate a temperature reading of a grill session
  rpc EvalGrillSession (GrillEvalRequest) returns (GrillEvalResponse) {}
}

// The request message containing the data of the grill session to evaluate
message GrillEvalRequest {
  string sensor_id = 1;
  int32 minutes_elapsed = 2;
  float target_temp = 3;
  float current_temp = 4;
}

// The response message containing the evaluation result for the grill session
message GrillEvalResponse {
  float minutes_remaining = 1;
  float confidence = 2;
  string message = 3;
}
